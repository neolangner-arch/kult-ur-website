<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Kult[ur]</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f0ede6;
      --black: #1c1c1a;
      --green: #3a6b35;
      --muted: #8a8680;
      --border: #dedad3;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      font-weight: 400;
    }
    .nav-home {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      font-weight: 400;
      transition: color 0.25s;
    }
    .nav-home:hover { color: var(--green); }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 2.5rem;
      max-width: 700px;
    }

    .error-label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .error-label::before {
      content: '';
      display: inline-block;
      width: 40px;
      height: 1px;
      background: var(--muted);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 400;
      line-height: 1.05;
      color: var(--black);
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--green);
    }

    .error-text {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 3rem;
      max-width: 420px;
    }

    .btn-back {
      font-family: 'Barlow', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      background: transparent;
      border: 1px solid var(--black);
      padding: 1rem 2.5rem;
      text-decoration: none;
      display: inline-block;
      transition: background 0.25s, color 0.25s;
      font-weight: 400;
    }
    .btn-back:hover {
      background: var(--black);
      color: var(--cream);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.75rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-copy {
      font-size: 0.72rem;
      color: var(--muted);
    }

    @media (max-width: 680px) {
      nav, main, footer { padding-left: 1.25rem; padding-right: 1.25rem; }
      footer { flex-direction: column; gap: 0.75rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Kult[ur]</a>
    <a href="/" class="nav-home">Zurück zur Startseite</a>
  </nav>

  <main>
    <p class="error-label">404 — Seite nicht gefunden</p>
    <h1>Diese Seite<br/><em>existiert nicht.</em></h1>
    <p class="error-text">
      Die gesuchte Seite wurde möglicherweise verschoben, umbenannt oder existiert nicht mehr.
    </p>
    <a href="/" class="btn-back">Zur Startseite</a>
  </main>

  <footer>
    <p class="footer-copy">© 2026 Neo-Luca Guido Langner. Alle Rechte vorbehalten.</p>
  </footer>

</body>
</html>
